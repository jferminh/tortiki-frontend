spring:
  application:
    name: tortiki-frontend
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
  mvc:
    hiddenmethod:
      filter:
        enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB         # Limite raisonnable pour une photo de plat
      max-request-size: 8MB      # Marge pour photo + champs texte + allergènes
      file-size-threshold: 2KB   # Écrit sur disque au-delà (évite la RAM pour gros fichiers)# active PUT/DELETE depuis les formulaires HTML

server:
  port: 8081  # l'API tourne sur 8080, le frontend sur 8081
  error:
    whitelabel:
      enabled: false
  tomcat:
    max-part-count: 30
    max-part-header-size: 2048

management:
  endpoints:
    web:
      exposure:
        include: health, info

tortiki:
  api:
    url: ${TORTIKI_API_URL:http://localhost:8080}

logging:
  level:
    com.tortiki.frontend: INFO
    org.springframework.security: DEBUG  # à retirer en prod
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <title>Tortiki - Types de cuisine</title>
    <th:block th:replace="~{fragments/layout :: head(title='Types de cuisine')}"></th:block>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h4 fw-bold mb-0">Référentiel des types de cuisine</h1>
            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">Retour au dashboard</a>
        </div>

        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

        <div class="card shadow-sm border-0 p-4 mb-4">
            <h2 class="h6 fw-bold mb-3">Ajouter un type de cuisine</h2>
            <form th:action="@{/admin/cuisine-types}" th:object="${createCuisineTypeRequest}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label for="name" class="form-label">Nom</label>
                    <input type="text" id="name" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                           th:field="*{name}">
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea id="description" class="form-control" rows="2"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                              th:field="*{description}"></textarea>
                    <div class="invalid-feedback" th:errors="*{description}"></div>
                </div>

                <button type="submit" class="btn btn-success">Créer</button>
            </form>
        </div>

        <div class="table-responsive">
            <table class="table align-middle bg-white shadow-sm">
                <thead>
                <tr>
                    <th>Nom</th>
                    <th>Description</th>
                    <th>Actif</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cuisineType : ${cuisineTypes}">
                    <td th:text="${cuisineType.name}">Nom</td>
                    <td th:text="${cuisineType.description}">Description</td>
                    <td>
            <span class="badge" th:classappend="${cuisineType.enabled} ? 'bg-success' : 'bg-secondary'"
                  th:text="${cuisineType.enabled} ? 'Oui' : 'Non'">Statut</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/cuisine-types/{id}/delete(id=${cuisineType.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('Confirmer la suppression ?');">Supprimer</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(cuisineTypes)}">
                    <td colspan="4" class="text-center text-muted py-4">Aucun type de cuisine.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

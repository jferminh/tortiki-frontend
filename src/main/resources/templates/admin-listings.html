<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <title>Tortiki - Modération des annonces</title>
    <th:block th:replace="~{fragments/layout :: head(title='Modération des annonces')}"></th:block>
</head>
<body class="bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h4 fw-bold mb-0">Modération des annonces</h1>
            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">Retour au dashboard</a>
        </div>

        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

        <div class="table-responsive">
            <table class="table align-middle bg-white shadow-sm">
                <thead>
                <tr>
                    <th>Photo</th>
                    <th>Titre</th>
                    <th>Vendeur</th>
                    <th>Ville</th>
                    <th>Prix</th>
                    <th>Statut</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="listing : ${listings}">
                    <td>
                        <img th:if="${listing.photoUrl}" th:src="${listing.photoUrl}"
                             alt="Photo du plat" class="rounded" style="width:56px;height:56px;object-fit:cover;">
                        <span th:unless="${listing.photoUrl}" class="text-muted small">Aucune</span>
                    </td>
                    <td th:text="${listing.title}">Titre</td>
                    <td th:text="${listing.sellerEmail}">vendeur@tortiki.fr</td>
                    <td th:text="${listing.city}">Nancy</td>
                    <td th:text="${listing.price} + ' €'">0.00 €</td>
                    <td>
            <span class="badge"
                  th:classappend="${listing.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                  th:text="${listing.status}">STATUT</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/listings/{id}/status(id=${listing.id})}" method="post" class="d-flex gap-1">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" name="newStatus" value="ACTIVE"
                                    class="btn btn-sm btn-outline-success"
                                    th:disabled="${listing.status == 'ACTIVE'}">Activer</button>
                            <button type="submit" name="newStatus" value="INACTIVE"
                                    class="btn btn-sm btn-outline-danger"
                                    th:disabled="${listing.status == 'INACTIVE'}">Désactiver</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listings)}">
                    <td colspan="7" class="text-center text-muted py-4">Aucune annonce à modérer.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

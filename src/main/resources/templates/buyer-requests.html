<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mes demandes de contact')}">
    <title>Mes demandes de contact — Tortiki</title>
</head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main>
    <div class="container py-4 py-md-5">

        <h1 class="h3 mb-4">Mes demandes de contact</h1>

        <div th:if="${requests.isEmpty()}" class="text-center py-5">
            <p class="text-muted mb-3">
                Vous n'avez encore soumis aucune demande de contact.
            </p>
            <a th:href="@{/search}" class="btn btn-success">
                Découvrir des annonces
            </a>
        </div>

        <div th:unless="${requests.isEmpty()}" class="row g-3">
            <div class="col-12 col-md-6 col-lg-4" th:each="request : ${requests}">
                <div class="card h-100 shadow-sm">

                    <img th:if="${request.listingPhotoUrl() != null}"
                         th:src="${request.listingPhotoUrl()}"
                         class="card-img-top"
                         style="height: 160px; object-fit: cover;"
                         th:alt="${request.listingTitle()}">
                    <div th:unless="${request.listingPhotoUrl() != null}"
                         class="bg-light d-flex align-items-center justify-content-center"
                         style="height: 160px;">
                        <span class="text-muted small">Pas de photo</span>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h2 class="h6 card-title" th:text="${request.listingTitle()}">
                            Titre de l'annonce
                        </h2>

                        <p class="card-text text-muted small mb-1">
                            Vendeur : <span th:text="${request.sellerFirstName()}">Sofia</span>
                        </p>

                        <p class="card-text text-muted small mb-2"
                           th:text="${#temporals.format(request.createdAt(), 'dd/MM/yyyy à HH:mm')}">
                            15/07/2026 à 10:00
                        </p>

                        <p class="card-text mb-2" th:if="${request.message() != null}">
                            <em th:text="'« ' + ${request.message()} + ' »'">« Message »</em>
                        </p>

                        <p class="card-text small mb-3">
                            Portions demandées : <strong th:text="${request.portions()}">2</strong>
                        </p>

                        <div class="mt-auto">
              <span th:if="${request.status().name() == 'PENDING'}"
                    class="badge bg-warning text-dark">
                En attente
              </span>
                            <span th:if="${request.status().name() == 'CONFIRMED'}"
                                  class="badge bg-success">
                Confirmée
              </span>
                            <span th:if="${request.status().name() == 'REFUSED'}"
                                  class="badge bg-danger">
                Refusée
              </span>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>

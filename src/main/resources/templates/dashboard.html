<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="'Tableau de bord — Tortiki'">Tableau de bord — Tortiki</title>
    <th:block th:replace="~{layout :: head('Tableau de bord')}"></th:block>
</head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<main class="container py-5">

    <h1 class="h3 fw-bold mb-4">Mes demandes de contact</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div th:if="${requests.isEmpty()}" class="text-muted">
        Aucune demande de contact reçue pour le moment.
    </div>

    <div th:unless="${requests.isEmpty()}" class="row g-3">
        <div class="col-12" th:each="req : ${requests}">
            <div class="card border-0 shadow-sm">
                <div class="card-body d-flex flex-column flex-md-row justify-content-between gap-3">

                    <div>
                        <h2 class="h6 fw-bold mb-1" th:text="${req.listingTitle}">Titre du plat</h2>
                        <p class="small text-muted mb-1">
                            Demande de <span th:text="${req.buyerFirstName}">Prénom</span>
                            pour <span th:text="${req.portions}">0</span> portion(s)
                        </p>
                        <p class="small mb-0" th:text="${req.message}">Message du client</p>
                    </div>

                    <div class="d-flex flex-column align-items-end gap-2">
                        <span class="badge"
                              th:classappend="${req.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                               (${req.status.name() == 'CONFIRMED'} ? 'bg-success' : 'bg-secondary')"
                              th:text="${req.status.name() == 'PENDING'} ? 'En attente' :
                                        (${req.status.name() == 'CONFIRMED'} ? 'Confirmée' : 'Refusée')">
                            Statut
                        </span>

                        <div th:if="${req.status.name() == 'PENDING'}" class="d-flex gap-2">
                            <form th:action="@{/dashboard/contact-requests/{id}/status(id=${req.id})}"
                                  method="post">
                                <input type="hidden" name="newStatus" value="CONFIRMED"/>
                                <button type="submit" class="btn btn-success btn-sm">Confirmer</button>
                            </form>
                            <form th:action="@{/dashboard/contact-requests/{id}/status(id=${req.id})}"
                                  method="post">
                                <input type="hidden" name="newStatus" value="REFUSED"/>
                                <button type="submit" class="btn btn-outline-danger btn-sm">Refuser</button>
                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{layout :: footer}"></footer>
</body>
</html>

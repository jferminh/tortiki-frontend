<!-- templates/error/404.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <th:block th:replace="~{fragments/layout :: head(title='Page introuvable')}"></th:block>
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5 text-center">
    <h1 class="display-1 fw-bold text-success">404</h1>
    <p class="h4 mb-3">Cette page n'existe pas.</p>
    <p class="text-muted mb-4">L'annonce ou la ressource demandée a peut-être été supprimée.</p>
    <a th:href="@{/}" class="btn btn-success">Retour à l'accueil</a>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head(title='Publier une annonce')">
    <title>Tortiki — Publier une annonce</title>
</head>
<body>
<nav th:replace="fragments/layout :: navbar"></nav>

<main class="container py-5" style="max-width: 640px;">
    <div class="card shadow-sm border-0 p-4">
        <h1 class="h4 fw-bold mb-4"
            th:text="${isEdit} ? 'Modifier l\'annonce' : 'Publier une nouvelle annonce'">
            Annonce
        </h1>

        <form th:action="@{${formAction}}"
              th:object="${listingRequest}"
              method="post"
              enctype="multipart/form-data">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label for="title" class="form-label">Titre</label>
                <input type="text" id="title" class="form-control"
                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                       th:field="*{title}">
                <div class="invalid-feedback" th:errors="*{title}"></div>
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" class="form-control" rows="4"
                          th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                          th:field="*{description}"></textarea>
                <div class="invalid-feedback" th:errors="*{description}"></div>
            </div>

            <div class="row g-3">
                <div class="col-6">
                    <label for="price" class="form-label">Prix</label>
                    <input type="number" id="price" class="form-control" step="0.01" min="0.5"
                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                           th:field="*{price}">
                    <div class="invalid-feedback" th:errors="*{price}"></div>
                </div>
                <div class="col-6">
                    <label for="portions" class="form-label">Nombre de portions</label>
                    <input type="number" id="portions" class="form-control" min="1"
                           th:classappend="${#fields.hasErrors('portions')} ? 'is-invalid'"
                           th:field="*{portions}">
                    <div class="invalid-feedback" th:errors="*{portions}"></div>
                </div>
            </div>

            <div class="mb-3 mt-3">
                <label for="pickupAddress" class="form-label">Adresse de retrait</label>
                <input type="text" id="pickupAddress" class="form-control"
                       th:classappend="${#fields.hasErrors('pickupAddress')} ? 'is-invalid'"
                       th:field="*{pickupAddress}">
                <div class="invalid-feedback" th:errors="*{pickupAddress}"></div>
            </div>

            <div class="mb-3">
                <label for="pickupDatetime" class="form-label">Créneau de retrait</label>
                <input type="datetime-local" id="pickupDatetime" class="form-control"
                       th:classappend="${#fields.hasErrors('pickupDatetime')} ? 'is-invalid'"
                       th:field="*{pickupDatetime}">
                <div class="invalid-feedback" th:errors="*{pickupDatetime}"></div>
            </div>

            <div class="mb-3">
                <label for="cuisineTypeId" class="form-label">Type de cuisine</label>
                <select id="cuisineTypeId" class="form-select"
                        th:classappend="${#fields.hasErrors('cuisineTypeId')} ? 'is-invalid'"
                        th:field="*{cuisineTypeId}">
                    <option value="">Sélectionner</option>
                    <option th:each="cuisineType : ${cuisineTypes}"
                            th:value="${cuisineType.id}"
                            th:text="${cuisineType.name}"></option>
                </select>
                <div class="invalid-feedback" th:errors="*{cuisineTypeId}"></div>
            </div>

            <div class="mb-3">
                <label for="allergenIds" class="form-label">Allergènes</label>
                <select id="allergenIds" class="form-select" th:field="*{allergenIds}" multiple>
                    <option th:each="allergen : ${allergens}"
                            th:value="${allergen.id}"
                            th:text="${allergen.name}"></option>
                </select>
            </div>

            <div class="mb-4" th:unless="${isEdit}">
                <label for="photo" class="form-label">Photo</label>
                <input type="file" id="photo" name="photo" class="form-control" accept="image/*">
            </div>

            <button type="submit" class="btn btn-success w-100">Enregistrer</button>
        </form>
    </div>
</main>

<footer th:replace="fragments/layout :: footer"></footer>
</body>
</html>

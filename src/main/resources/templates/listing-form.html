<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <title>Tortiki — Publier une annonce</title>
    <th:block th:replace="~{fragments/layout :: head('Publier une annonce')}"></th:block>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
    <div class="container" style="max-width: 640px;">
        <div class="card shadow-sm border-0 p-4">
            <h1 class="h4 fw-bold mb-4"
                th:text="${isEdit} ? 'Modifier l\'annonce' : 'Publier une nouvelle annonce'">
                Annonce
            </h1>

            <form th:action="@{${formAction}}"
                  th:object="${listingRequest}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="mb-3">
                    <label for="title" class="form-label small">Titre du plat</label>
                    <input type="text" id="title" th:field="*{title}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label small">Description</label>
                    <textarea id="description" th:field="*{description}" rows="4"
                              class="form-control"
                              th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:errors="*{description}"></div>
                </div>

                <div class="row g-3">
                    <div class="col-6">
                        <label for="price" class="form-label small">Prix (€)</label>
                        <input type="number" step="0.50" id="price" th:field="*{price}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{price}"></div>
                    </div>
                    <div class="col-6">
                        <label for="portionsAvailable" class="form-label small">Portions disponibles</label>
                        <input type="number" id="portionsAvailable" th:field="*{portionsAvailable}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('portionsAvailable')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{portionsAvailable}"></div>
                    </div>
                </div>

                <div class="mb-3 mt-3">
                    <label for="cuisineTypeId" class="form-label small">Type de cuisine</label>
                    <select id="cuisineTypeId" th:field="*{cuisineTypeId}"
                            class="form-select"
                            th:classappend="${#fields.hasErrors('cuisineTypeId')} ? 'is-invalid'">
                        <option value="">Choisir un type de cuisine</option>
                        <option th:each="cuisine : ${cuisineTypes}"
                                th:value="${cuisine.id}"
                                th:text="${cuisine.name}">Cuisine</option>
                    </select>
                    <div class="invalid-feedback" th:errors="*{cuisineTypeId}"></div>
                </div>

                <div class="mb-3">
                    <label for="city" class="form-label small">Ville de retrait</label>
                    <input type="text" id="city" th:field="*{city}"
                           class="form-control"
                           th:classappend="${#fields.hasErrors('city')} ? 'is-invalid'"/>
                    <div class="invalid-feedback" th:errors="*{city}"></div>
                </div>

                <div class="mb-4" th:unless="${isEdit}">
                    <label for="photo" class="form-label small">Photo du plat</label>
                    <input type="file" id="photo" name="photo" accept="image/*" class="form-control"/>
                </div>

                <button type="submit" class="btn btn-success w-100">
          <span th:text="${isEdit} ? 'Enregistrer les modifications' : 'Publier l\'annonce'">
            Publier
          </span>
                </button>
            </form>
        </div>
    </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

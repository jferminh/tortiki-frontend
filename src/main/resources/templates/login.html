<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
  <title>Tortiki — Connexion</title>
  <th:block th:replace="~{fragments/layout :: head('Connexion')}"></th:block>
</head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<section class="py-5">
  <div class="container" style="max-width: 420px;">
    <div class="card shadow-sm border-0 p-4">
      <h1 class="h4 fw-bold mb-4 text-center">Connexion</h1>

      <div th:if="${param.error}" class="alert alert-danger small">
        Email ou mot de passe incorrect.
      </div>
      <div th:if="${param.logout}" class="alert alert-success small">
        Vous avez été déconnecté avec succès.
      </div>

      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label for="username" class="form-label small">Email</label>
          <input type="email" id="username" name="username"
                 class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label small">Mot de passe</label>
          <input type="password" id="password" name="password"
                 class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-success w-100">Se connecter</button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Pas encore de compte ?
        <a th:href="@{/register}">Créer un compte</a>
      </p>
    </div>
  </div>
</section>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

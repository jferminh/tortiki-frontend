<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <title>Tortiki - Mes annonces</title>
    <th:block th:replace="fragments/layout :: head(title='Mes annonces')">Mes annonces</th:block>
</head>
<body class="bg-light">
<nav th:replace="fragments/layout :: navbar"></nav>

<section class="py-5">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h4 fw-bold mb-0">Mes annonces</h1>
            <a th:href="@{/seller/listings/new}" class="btn btn-success">Publier une annonce</a>
        </div>

        <div th:if="${success != null}" class="alert alert-success small" th:text="${success}"></div>

        <div class="row g-4">
            <div class="col-12 col-sm-6 col-md-4" th:each="listing : ${listings}">
                <div class="card h-100 shadow-sm border-0">
                    <img th:if="${listing.photoUrl}" th:src="${listing.photoUrl}"
                         class="card-img-top" style="height: 180px; object-fit: cover;"
                         th:alt="${listing.title}">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-1">
                            <h3 class="h6 fw-semibold mb-0" th:text="${listing.title}">Plat</h3>
                            <span class="badge"
                                  th:class="${listing.status == 'ACTIVE'} ? 'badge bg-success' : 'badge bg-secondary'"
                                  th:text="${listing.status}">STATUT</span>
                        </div>
                        <p class="small text-muted mb-1" th:text="${listing.pickupAddress}">Adresse</p>
                        <p class="fw-bold text-success mb-3">
                            <span th:text="${listing.price}"></span> € —
                            <span th:text="${listing.portions}"></span> portions
                        </p>

                        <div class="mt-auto d-flex flex-column gap-2">
                            <a th:href="@{/seller/listings/{id}/edit(id=${listing.id})}"
                               class="btn btn-outline-success btn-sm w-100">Modifier</a>

                            <form th:if="${listing.status == 'ACTIVE'}"
                                  th:action="@{/seller/listings/{id}/delete(id=${listing.id})}"
                                  method="post"
                                  onsubmit="return confirm('Désactiver cette annonce ? Elle ne sera plus visible par les acheteurs.');">
                                <button type="submit" class="btn btn-outline-danger btn-sm w-100">
                                    Désactiver
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12 text-center text-muted py-5" th:if="${#lists.isEmpty(listings)}">
                <h3 class="h5">Aucune annonce publiée</h3>
                <p class="mb-4">Commencez à partager vos plats faits maison.</p>
                <a th:href="@{/seller/listings/new}" class="btn btn-success">Publier ma première annonce</a>
            </div>
        </div>
    </div>
</section>

<footer th:replace="fragments/layout :: footer"></footer>
</body>
</html>
